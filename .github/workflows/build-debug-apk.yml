name: Build Debug APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    env:
      GRADLE_VERSION: 8.7
      ANDROID_PLATFORM: android-34
      ANDROID_BUILD_TOOLS: 34.0.0

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;${ANDROID_PLATFORM}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Write local.properties
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          cat local.properties

      - name: Install Gradle
        run: |
          curl -fsSL -o /tmp/gradle.zip "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          unzip -q /tmp/gradle.zip -d "$HOME"
          echo "$HOME/gradle-${GRADLE_VERSION}/bin" >> "$GITHUB_PATH"
          gradle --version

      - name: Build debug APK
        run: |
          gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ai_voice_assistant-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  telegram-delivery:
    runs-on: ubuntu-latest
    needs: build-debug-apk

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: Ai_voice_assistant-debug-apk
          path: dist

      - name: Show Telegram secret status
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not configured; skipping delivery."
            exit 0
          fi
          echo "Telegram secrets are configured."

      - name: Send APK to Telegram
        if: ${{ env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        run: |
          python3 scripts/send_apk_to_telegram.py dist/app-debug.apk

  github-release:
    runs-on: ubuntu-latest
    needs: build-debug-apk
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: Ai_voice_assistant-debug-apk
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: "Ai_voice_assistant nightly #${{ github.run_number }}"
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: true
          draft: false
          overwrite_files: true
          files: |
            dist/app-debug.apk
          body: |
            Automated debug APK build from commit ${{ github.sha }}.

            Install this APK on the phone to update the app.
            Open the app menu → "업데이트 확인" to reach this release page.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
